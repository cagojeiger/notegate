services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: notegate
      POSTGRES_PASSWORD: notegate
      POSTGRES_DB: notegate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notegate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    scale: 2
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    env_file:
      - .env
    environment:
      NOTEGATE_DATABASE_URL: postgres://notegate:notegate@postgres:5432/notegate
    expose:
      - "9191"
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "9191:9191"
    volumes:
      - ./deploy/nginx/notegate.conf:/etc/nginx/conf.d/notegate.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
