x-api-environment: &api-environment
  NOTEGATE_BIND_ADDR: 0.0.0.0:9191
  NOTEGATE_DATABASE_URL: postgres://notegate:notegate@postgres:5432/notegate
  NOTEGATE_DB_MAX_CONNECTIONS: 10
  LOG_FORMAT: json
  NOTEGATE_AUTHGATE_URL: https://authgate.project-jelly.io
  NOTEGATE_PUBLIC_URL: http://localhost:9191
  NOTEGATE_OAUTH_CLIENT_ID: notegate-web
  NOTEGATE_MCP_OAUTH_CLIENT_ID: notegate-mcp
  NOTEGATE_OAUTH_REDIRECT_URL: http://localhost:9191/auth/callback
  NOTEGATE_RESOURCE_URL: http://localhost:9191/mcp
  NOTEGATE_JWKS_CACHE_TTL_SECS: 300
  NOTEGATE_ENC_ROOT_KEY_ID: dev-enc
  NOTEGATE_ENC_ROOT_SECRET: dev-notegate-enc-root-secret-32-bytes
  NOTEGATE_LOOKUP_ROOT_KEY_ID: dev-lookup
  NOTEGATE_LOOKUP_ROOT_SECRET: dev-notegate-lookup-root-secret-32-bytes
  NOTEGATE_BROWSER_SESSION_TTL_SECS: 3600
  NOTEGATE_OPENAPI_ENABLED: "false"
  # Capacity caps default to spec values. Uncomment small values for cheap
  # local/E2E boundary tests.
  # NOTEGATE_LIMITS__FOLDER_MAX_CHILDREN: "3"
  # NOTEGATE_LIMITS__WORKSPACE_MAX_NODES: "5"
  # NOTEGATE_LIMITS__WORKSPACE_MAX_DOCUMENTS: "2"
  # NOTEGATE_LIMITS__WORKSPACE_MAX_DOCUMENT_BYTES: "1024"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: notegate
      POSTGRES_PASSWORD: notegate
      POSTGRES_DB: notegate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notegate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    # Local default runs two replicas so MCP/API horizontal scaling is exercised
    # during normal docker compose development.
    scale: 2
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *api-environment
    expose:
      - "9191"
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Local reverse proxy. It owns the public 9191 port so the api service can
  # be scaled without host port conflicts.
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "9191:9191"
    volumes:
      - ./deploy/nginx/notegate.conf:/etc/nginx/conf.d/notegate.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
