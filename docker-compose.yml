services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-root-secret}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:9191,http://127.0.0.1:9191}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Notegate never creates buckets or identities. This one-shot local bootstrap
  # acts as the operator for the development bucket and app account.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-root-secret}
      NOTEGATE_S3_BUCKET: ${NOTEGATE_S3__BUCKET:-notegate}
      NOTEGATE_S3_ACCESS_KEY: ${NOTEGATE_S3__ACCESS_KEY:-notegate-app}
      NOTEGATE_S3_SECRET_KEY: ${NOTEGATE_S3__SECRET_KEY:-notegate-app-secret}
    volumes:
      - ./deploy/minio/init.sh:/config/init.sh:ro
    entrypoint: ["/bin/sh", "/config/init.sh"]
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: notegate
      POSTGRES_PASSWORD: notegate
      POSTGRES_DB: notegate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notegate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    scale: 2
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    env_file:
      - .env
    environment:
      NOTEGATE_DATABASE_URL: postgres://notegate:notegate@postgres:5432/notegate
      # The broad local env_file must not expose MinIO operator credentials.
      MINIO_ROOT_USER: ""
      MINIO_ROOT_PASSWORD: ""
      NOTEGATE_S3__ENDPOINT: http://minio:9000
      NOTEGATE_S3__PUBLIC_ENDPOINT: ${NOTEGATE_S3__PUBLIC_ENDPOINT:-http://localhost:9000}
      NOTEGATE_S3__REGION: ${NOTEGATE_S3__REGION:-us-east-1}
      NOTEGATE_S3__BUCKET: ${NOTEGATE_S3__BUCKET:-notegate}
      NOTEGATE_S3__ACCESS_KEY: ${NOTEGATE_S3__ACCESS_KEY:-notegate-app}
      NOTEGATE_S3__SECRET_KEY: ${NOTEGATE_S3__SECRET_KEY:-notegate-app-secret}
      NOTEGATE_S3__FORCE_PATH_STYLE: ${NOTEGATE_S3__FORCE_PATH_STYLE:-true}
    expose:
      - "9191"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 90s
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "9191:9191"
    volumes:
      - ./deploy/nginx/notegate.conf:/etc/nginx/conf.d/notegate.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  minio-data:
