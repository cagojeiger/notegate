name: Release

# Release flow:
# 1. Bump VERSION in a release PR.
# 2. Merging that PR to main builds/pushes GHCR images, tags vX.Y.Z,
#    and creates a GitHub Release.
#
# amd64 and arm64 are built on native runners and merged into one multi-arch
# manifest. This mirrors opsgate and avoids slow emulated Rust builds.
on:
  push:
    branches: [main]
    paths:
      - VERSION

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: ver
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          if [ -z "$version" ]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Guard duplicate tag
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::tag $tag already exists; bump VERSION before merging"
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: version
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=notegate-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=notegate-release-${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          version="${{ needs.version.outputs.version }}"
          images=()
          for digest in *; do
            images+=("${REGISTRY}/${IMAGE}@sha256:${digest}")
          done
          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE}:${version}" \
            -t "${REGISTRY}/${IMAGE}:latest" \
            "${images[@]}"

      - name: Inspect manifest
        run: |
          version="${{ needs.version.outputs.version }}"
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE}:${version}"

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.version.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes
