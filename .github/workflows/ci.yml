name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Format
        run: cargo fmt --all --check

      - name: Diff check
        run: git diff --check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: notegate
          POSTGRES_PASSWORD: notegate
          POSTGRES_DB: notegate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notegate -d notegate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NOTEGATE_TEST_DATABASE_URL: postgres://notegate:notegate@localhost:5432/notegate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.3

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test

      - name: Build
        run: pnpm --filter web build
