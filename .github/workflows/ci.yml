name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Format
        run: cargo fmt --all --check

      - name: Diff check
        run: git diff --check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: notegate
          POSTGRES_PASSWORD: notegate
          POSTGRES_DB: notegate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notegate -d notegate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NOTEGATE_TEST_DATABASE_URL: postgres://notegate:notegate@localhost:5432/notegate
      NOTEGATE_TEST_S3_ENDPOINT: http://127.0.0.1:9000
      NOTEGATE_TEST_S3_PUBLIC_ENDPOINT: http://127.0.0.1:9000
      NOTEGATE_TEST_S3_REGION: us-east-1
      NOTEGATE_TEST_S3_BUCKET: notegate-test
      NOTEGATE_TEST_S3_ACCESS_KEY: notegate-app
      NOTEGATE_TEST_S3_SECRET_KEY: notegate-app-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Start MinIO
        run: |
          docker run --detach --name notegate-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER=minio-root \
            --env MINIO_ROOT_PASSWORD=minio-root-secret \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              docker logs notegate-minio
              exit 1
            fi
            sleep 1
          done
          docker run --rm --network host \
            --env MINIO_ENDPOINT=http://127.0.0.1:9000 \
            --env MINIO_ROOT_USER=minio-root \
            --env MINIO_ROOT_PASSWORD=minio-root-secret \
            --env NOTEGATE_S3_BUCKET=notegate-test \
            --env NOTEGATE_S3_ACCESS_KEY=notegate-app \
            --env NOTEGATE_S3_SECRET_KEY=notegate-app-secret \
            --volume "$PWD/deploy/minio/init.sh:/config/init.sh:ro" \
            --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z /config/init.sh

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.3

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test

      - name: Build
        run: pnpm --filter web build
