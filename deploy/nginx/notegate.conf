log_format notegate_proxy '$remote_addr - $request '
                          'status=$status upstream=$upstream_addr '
                          'request_time=$request_time upstream_time=$upstream_response_time';

resolver 127.0.0.11 valid=5s ipv6=off;

upstream notegate_web {
    zone notegate_web 64k;
    server web:9191 resolve;
}

server {
    listen 9191;
    server_name _;

    access_log /dev/stdout notegate_proxy;
    error_log /dev/stderr warn;

    location / {
        proxy_pass http://notegate_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # Keep MCP streamable HTTP/SSE-style responses unbuffered.
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
